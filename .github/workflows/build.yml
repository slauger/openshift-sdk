name: Build (Docker) with matrix

on:
  push:
    branches:
      - master
  schedule:
    # Runs daily at 01:00 UTC (~ 03:00 Europe/Berlin during DST)
    - cron: '0 1 * * *'

# Serializes concurrent runs similar to GitLab's resource_group
concurrency:
  group: build-image
  cancel-in-progress: false

jobs:
  discover-versions:
    name: Discover OpenShift versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.channels.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover latest stable channels
        id: channels
        run: |
          matrix=$(python3 scripts/discover_versions.py)
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build & Push (${{ matrix.release_channel }})
    needs: discover-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-versions.outputs.matrix) }}

    env:
      DEPLOYMENT_TYPE: ocp
      RELEASE_CHANNEL: ${{ matrix.release_channel }}
      OPENSHIFT_RELEASE: ${{ matrix.openshift_release }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install tools (make, jq, curl, wget)
        run: |
          sudo apt-get update
          sudo apt-get install -y make jq curl wget

      - name: Fetch
        run: make fetch

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Push
        run: make push
